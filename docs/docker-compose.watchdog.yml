# ABS watchdog —— 自包含单文件版（脚本已编码内嵌，无需上传任何脚本文件）
# 功能：① 下载卡死自动重启+重新入队
#       ② [治本]每档主动裁到 KEEP_PER_PODCAST 集(默认 TRIM_ENABLED=0 只报不删)——ABS 的 maxEpisodesToKeep
#          不回溯历史，每档只增不减逼近总上限；主动维持每档 N 集后总量自然远低于 CAP、几乎不触发③
#       ③ 总存储兜底监测，超 STORAGE_CAP_GB 自动删全局最老的集到 STORAGE_TARGET_GB（只删集不删节目）
#
# 部署 / 更新（飞牛桌面 → Docker → 左侧「Compose」→「新增项目」；已存在则进项目「编辑」替换后重新部署）：
#   1) 项目名 abs-watchdog
#   2) 把本文件【全部内容】粘进 compose 编辑框
#   3) 只需改一处：ABS_TOKEN= 后面换成你的 downL token
#      （ABS 网页 → 设置 → 用户 → 你的用户 → API Token 复制）
#   4) 创建并启动 →「容器」里看 abs-watchdog 日志：
#        每 20 分钟一行 "OK downloading..." + 一行 "storage: XXXgb / cap 500GB"
#
# 存储说明（重要）：
#   - 删集走 ABS 接口 DELETE /api/podcasts/{id}/episode/{id}（已实测路由存在，与 maxEpisodesToKeep 同机制、真释放磁盘）
#   - [2026-06 实测] 当前 43 档 6513 集 ≈ 493G / cap 500G —— 已逼近上限！因 ABS 的 maxEpisodesToKeep=100
#     不回溯裁剪历史(每档实际几百集)。建议：先让 TRIM_ENABLED=0 跑一轮看日志"会删多少"，确认后改 1
#     启用每档裁剪(治本，总量将回落到约 43×100 集，远低于 cap)；或把 STORAGE_CAP_GB 调高(硬盘够大时)。
#   - trim/evict 都不删节目本身；每档至少保留最近 KEEP_MIN_PER_PODCAST 集（不删空）
#   - 想全程只监测不删：TRIM_ENABLED=0 且 EVICT_ENABLED=0（日志照报占用与"会删多少"，但不删任何集）
#   - autoDownload 只追"新发布集"，不会重下已被 trim 删掉的老集
# 安全：token 只在本 compose 内，别外发、别提交 git。挂 docker.sock = 该容器有宿主 Docker 控制权（用于重启 ABS）。

services:
  abs-watchdog:
    image: python:3.12-slim
    container_name: abs-watchdog
    restart: unless-stopped
    network_mode: host
    environment:
      - ABS_TOKEN=在这里粘贴你的downL_token          # ← 只改这一行
      - ABS_BASE=http://127.0.0.1:13378/audiobookshelf
      - LIBRARY_ID=c4379a59-72a4-4b8f-8f89-5170602f8469
      - ABS_CONTAINER=audiobookshelf-audiobookshelf-1  # ABS 容器实际名（已确认）
      - STALL_MINUTES=30                # 当前下载项卡死超此分钟数 → 重启 ABS
      - INTERVAL_SECONDS=1200           # 每 20 分钟一轮（下载检查 + 存储检查）
      - MAX_RESTARTS_PER_DAY=4          # 当日自动重启上限，防风暴
      - KEEP_PER_PODCAST=100            # 重新入队时每档下载/保留集数
      - STORAGE_CAP_GB=500              # 总占用硬上限，超了开始删
      - STORAGE_TARGET_GB=480           # 删到这个水位停（留缓冲不反复触发）
      - KEEP_MIN_PER_PODCAST=10         # 每档至少保留最近 N 集，绝不删空
      - EVICT_ENABLED=1                 # 1=超限自动删；0=只监测告警不删
      - TRIM_ENABLED=0                  # [治本]每档主动裁到 KEEP_PER_PODCAST 集(ABS maxKeep 不回溯→只增不减)；0=DRY-RUN 只在日志报"会删多少"不真删，观察满意后改 1 真裁
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["python", "-u", "-c"]
    command:
      - "import base64;exec(base64.b64decode('').decode('utf-8'))"
